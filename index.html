function AddRandomGoogleFont() {
  var newFont = GoogleFonts[Math.ceil(GoogleFonts.length * Math.random())]
  var link = document.createElement('link')
  link.rel = 'stylesheet'
  link.href = `https://fonts.googleapis.com/css?family=${newFont}`
  document.head.appendChild(link)
  return newFont
}

var font = AddRandomGoogleFont()
document.getElementById('box').style.fontFamily = font
document.getElementById('finder').style.fontFamily = font

document.getElementById('word').addEventListener('input', function() {
  const w = this.value.toLowerCase().replace(/[^a-z ,\.]/g, '')
  if (!w.length) { document.getElementById('prob').textContent = '-'; return }
  const exp = w.length * Math.log10(30)
  const mantissa = Math.pow(10, exp % 1)
  const exponent = -Math.floor(exp)
  document.getElementById('prob').textContent = `p = ${mantissa.toFixed(4)} × 10^${exponent}`
})

function a(n) {
  const b = document.getElementById('box')
  let t = ''
  for (let i = 0; i < n * 300; i++) t += 'abcdefghijklmnopqrstuvwxyz , .'[Math.floor(Math.random() * 30)]
  b.appendChild(document.createTextNode(t))
}

a(200)

window.addEventListener('scroll', () => {
  if ((window.innerHeight + window.scrollY) >= document.body.scrollHeight - 300) a(40)
})
